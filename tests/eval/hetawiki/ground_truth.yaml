# ─────────────────────────────────────────────────────────────
# query — cross-page questions
# ─────────────────────────────────────────────────────────────

- id: q-01
  eval_type: query
  question: "What is the relationship between backpropagation and gradient descent?"
  expected: "Backpropagation computes the gradients; gradient descent uses them to update weights"
  keywords: ["gradient", "backpropagation", "weights"]
  difficulty: medium

- id: q-02
  eval_type: query
  question: "What are the default hyperparameters of the Adam optimiser?"
  expected: "learning rate 1e-3, beta1 0.9, beta2 0.999, epsilon 1e-8"
  keywords: ["0.9", "0.999", "Adam"]
  difficulty: medium

- id: q-03
  eval_type: query
  question: "What techniques can prevent overfitting in neural networks?"
  expected: "dropout, L2 regularisation, early stopping, data augmentation"
  keywords: ["dropout", "regularisation", "early stopping"]
  difficulty: medium

- id: q-04
  eval_type: query
  question: "What dropout rate did Srivastava recommend for fully connected layers?"
  expected: "0.5"
  keywords: ["0.5", "dropout"]
  difficulty: easy

- id: q-05
  eval_type: query
  question: "What is the difference between L1 and L2 regularisation?"
  expected: "L1 produces sparse weights; L2 shrinks all weights toward zero"
  keywords: ["sparse", "L1", "L2"]
  difficulty: medium

- id: q-06
  eval_type: query
  question: "Who popularised backpropagation and in what year?"
  expected: "Rumelhart, Hinton, and Williams in 1986"
  keywords: ["Rumelhart", "Hinton", "1986"]
  difficulty: easy

