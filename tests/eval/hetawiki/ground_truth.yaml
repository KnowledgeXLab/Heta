# HetaWiki Evaluation Ground Truth
#
# Ingest order (default mode):
#   1. gradient_descent.md
#   2. backpropagation.md
# Ingest order (merge mode — tests linking):
#   3. neural_network.md   → should link to gradient_descent + backpropagation
#   4. overfitting.md      → should link to neural_network + regularization
#   5. regularization.md   → should link to overfitting
#
# Eval types:
#   ingest_content  — key facts must appear in the wiki page body
#   query           — wiki query must return answer containing keywords
#   graph_edge      — graph API must show an edge between two pages

# ─────────────────────────────────────────────────────────────
# ingest_content — gradient_descent
# ─────────────────────────────────────────────────────────────

- id: gd-01
  file: gradient_descent.md
  eval_type: ingest_content
  description: "Adam default learning rate is 1e-3"
  keywords: ["1e-3", "0.001", "Adam"]
  difficulty: easy

- id: gd-02
  file: gradient_descent.md
  eval_type: ingest_content
