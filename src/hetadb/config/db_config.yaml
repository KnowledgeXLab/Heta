# HetaDB processing-parameter template
#
# Usage:
#   1. cp db_config.example.yaml src/hetadb/config/db_config.yaml
#   2. Adjust the values below to match your hardware and workload
#
# All fields under [parameter] are required. The application will raise
# an error at startup if any field is missing.

# Batch size for bulk PostgreSQL inserts.
# Used when chunk/rechunk results are written back into PostgreSQL.
# Larger values improve throughput but also increase per-transaction cost.
postgres_batch_size: 500

# Maximum number of dataset parse tasks that run concurrently.
# This is the outer task-level concurrency managed by the parse executor.
# Each dataset still has its own internal stage concurrency, so this should
# stay conservative unless the machine and model rate limits are comfortable.
parse_max_workers: 1

parameter:
  # ── Parse stage ────────────────────────────────────────────────────────
  parse:
    # Concurrent parser workers inside one dataset.
    # Passed to ParserAssignment.step2_batch_parse(..., max_workers=...).
    max_workers: 4

    # File-extension allow-list for ParserAssignment.
    # "default" means use the built-in supported parser extensions.
    # You can also provide an explicit list such as [".pdf", ".docx", ".md"].
    supported_ext: default

  # ── Chunk + rechunk stage ──────────────────────────────────────────────
  chunk_rechunk:
    # Target text length per chunk generated by text_chunker.
    # Larger chunks reduce chunk count but make retrieval/extraction coarser.
    chunk_size: 1024

    # Overlap between adjacent chunks.
    # Preserves context across chunk boundaries at the cost of duplication.
    overlap: 50

    # Maximum byte size of one JSONL batch consumed by chunk_directory.
    # This is mainly a memory-safety bound for large parsed inputs.
    max_batch_bytes: 3221225472

    # Worker count for chunk_directory/write_batches_to_file processing.
    # This only affects chunk generation inside one dataset.
    max_workers: 16

    # Number of nearest chunk candidates retrieved from Milvus during
    # original-chunk merge.
    top_k: 10000

    # Milvus ANN search parameter used in chunk merge neighbour search.
    # Higher values typically improve recall while increasing latency.
    nprobe: 16

    # Early-stop threshold for iterative chunk merge.
    # When the merge ratio falls below this value, merge_original_chunks stops.
    merge_threshold: 0.05

    # Maximum number of iterative chunk-merge rounds.
    max_rounds: 10

    # Number of top merge candidates actually passed into the merge LLM prompt.
    # This is intentionally much smaller than top_k.
    num_topk_param: 5

  # ── Graph extraction stage ─────────────────────────────────────────────
  graph_extraction:
    # Reserved field for an entity schema CSV path.
    # The current mainline graph extraction path primarily uses runtime schema
    # strings; this field is kept as a config placeholder.
    entity_schema_csv_path:

    # Reserved field for a relation schema CSV path.
    # Same status as entity_schema_csv_path above.
    relation_schema_csv_path:

    # Number of chunk records buffered before graph extraction flushes node and
    # relation data to disk.
    batch_size: 2000

    # Concurrent LLM workers used by batch_extract_kg_from_chunks.
    # This is one of the main throughput / API-pressure controls.
    max_workers: 200

    # Maximum output file size for node/relation JSONL rolling.
    # Used by the graph extraction file managers, not by input chunk loading.
    max_file_size_bytes: 3221225472

    # Whether to persist raw extracted graph artifacts immediately after graph
    # extraction, before graph dedup starts.
    persist_raw_graph: false

  # ── Graph dedup stage ──────────────────────────────────────────────────
  graph_dedup:
    # Number of merge batches processed in parallel in one dedup round.
    parallel_batches: 16

    # Number of node/relation records grouped into one merge batch.
    batch_size: 500

    # Number of candidate items sent to the LLM in one dedup decision call.
    llm_batch_size: 70

    # Maximum number of iterative dedup / merge rounds.
    max_rounds: 10

    # Batch size used in Milvus-assisted final dedup.
    milvus_dedup_batch_size: 100

    # Maximum retry count for LLM merge calls in node/relation dedup.
    llm_max_retries: 3

    # Node merge thresholds
    node_merge:
      # Number of nearest node candidates retrieved from Milvus for dedup.
      top_k: 10

      # Similarity cutoff used for node candidate acceptance.
      # Higher values are stricter and usually reduce false merges.
      sim_threshold: 0.85

      # LLM temperature used in node merge decisions.
      temperature: 0.1

    # Relation merge thresholds
    rel_merge:
      # Number of nearest relation candidates retrieved from Milvus for dedup.
      top_k: 10

      # Similarity cutoff used for relation candidate acceptance.
      sim_threshold: 0.85

      # LLM temperature used in relation merge decisions.
      temperature: 0.1
