# HetaDB processing-parameter template
#
# Usage:
#   1. cp db_config.example.yaml src/hetadb/config/db_config.yaml
#   2. Adjust the values below to match your hardware and workload
#
# All fields under [parameter] are required. The application will raise
# an error at startup if any field is missing.

# Batch size for bulk PostgreSQL inserts.
postgres_batch_size: 500

# Maximum number of dataset parse tasks that run concurrently.
# Each task internally uses graph.max_workers threads for LLM calls, so the
# effective LLM concurrency = parse_max_workers × llm.max_concurrent_requests.
# Tune this to stay within your LLM provider's rate limit.
parse_max_workers: 1

parameter:
  # ── Text chunking ──────────────────────────────────────────────────────
  chunk_config:
    chunk_size: 1024              # Characters per chunk
    overlap: 50                   # Overlap between adjacent chunks
    max_batch_bytes: 3221225472   # Max bytes per batch (~3 GB)
    max_workers: 16               # Concurrent chunking threads

  # ── Knowledge-graph extraction ─────────────────────────────────────────
  graph_config:
    entity_schema_csv_path:       # Optional: path to entity schema CSV
    relation_schema_csv_path:     # Optional: path to relation schema CSV
    batch_size: 2000              # Records per extraction batch
    max_workers: 200              # Concurrent LLM threads for extraction
    max_file_size_bytes: 3221225472  # Max single-file size (~3 GB)

  # ── Graph dedup / merge ────────────────────────────────────────────────
  graph_merge_config:
    parallel_batches: 16          # Number of batches processed in parallel per round
    batch_size: 500               # Records per merge batch
    llm_batch_size: 70            # Entities/relations sent to LLM in one dedup call
    max_rounds: 10                # Max dedup iteration rounds
    milvus_dedup_batch_size: 100  # Batch size for Milvus-based dedup
    llm_max_retries: 3            # Max retries for LLM merge calls

    # Node merge thresholds
    node_merge:
      top_k: 10                   # Similar nodes returned by vector search
      sim_threshold: 0.85         # Cosine similarity threshold for Milvus dedup
      temperature: 0.1            # LLM temperature for merge decisions

    # Relation merge thresholds
    rel_merge:
      top_k: 10                   # Similar relations returned by vector search
      sim_threshold: 0.85         # Cosine similarity threshold for Milvus dedup
      temperature: 0.1            # LLM temperature for merge decisions
